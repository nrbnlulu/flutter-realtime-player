version: "3"

vars:
    DART_BIN: "fvm exec dart"
    FLUTTER_BIN: "fvm exec flutter"

tasks:
    codegen:
        cmds:
            - rm -rf .dart_tool
            - "{{.FLUTTER_BIN}} clean"
            - cd ./example  && {{.FLUTTER_BIN}} clean
            - flutter_rust_bridge_codegen generate
    test:
        cmds:
            - "{{.FLUTTER_BIN}} test --fail-fast --reporter=compact --coverage"
    lint:
        cmds:
            - cargo fix --allow-dirty
            - cargo check
            - "{{.FLUTTER_BIN}} analyze --disable-analytics ./lib"
            - "{{.DART_BIN}} fix --apply"
    fmt:
        cmds:
            - cargo fmt
            - "{{.DART_BIN}} format ./lib ./example"
